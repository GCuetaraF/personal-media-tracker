name: Scheduled Media Sync

on:
  schedule:
    - cron: "0 0 */15 * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
      STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
      STEAM_ID: ${{ secrets.STEAM_ID }}
      RETROACHIEVEMENTS_API_KEY: ${{ secrets.RETROACHIEVEMENTS_API_KEY }}
      RETROACHIEVEMENTS_USER_ID: ${{ secrets.RETROACHIEVEMENTS_USER_ID }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      YOUTUBE_PLAYLIST_ID: ${{ secrets.YOUTUBE_PLAYLIST_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run Steam sync
        run: npm start -- steam

      - name: Run RetroAchievements sync
        run: npm start -- retroachievements

      - name: Run YouTube sync
        run: npm start -- youtube

      - name: Run Trakt sync
        run: npm start -- trakt

      - name: Run Mangadex sync
        run: npm start -- mangadex

      - name: Run FreshRSS sync
        run: npm start -- freshrss
